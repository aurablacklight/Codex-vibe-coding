services:
  budgetbolt:
    build: .
    container_name: budgetbolt
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-secret-key}
      - DATABASE_URL=sqlite:///./data/budgetbolt.db
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    restart: unless-stopped
