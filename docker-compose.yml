services:
  budgetbolt:
    build: .
    container_name: budgetbolt
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-secret-key}
      - DATABASE_URL=sqlite:///./data/budgetbolt.db
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.gateway.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - AI_ENABLED=${AI_ENABLED:-true}
    extra_hosts:
      - "host.gateway.docker.internal:host-gateway"
    restart: unless-stopped
