services:
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: budgetbolt-v2-convex
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex-data:/convex/data
    environment:
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-http://localhost:3211}
    extra_hosts:
      - "host.gateway.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: budgetbolt-v2-dashboard
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://convex:3210
    depends_on:
      convex:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budgetbolt-v2-frontend
    ports:
      - "${PORT:-5100}:80"
    depends_on:
      convex:
        condition: service_healthy
    restart: unless-stopped

volumes:
  convex-data:
